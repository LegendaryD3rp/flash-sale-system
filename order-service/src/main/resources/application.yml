server:
  port: 8083

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:mysql://localhost:3306/flashsale?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 5000
      max-lifetime: 1800000

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.flashsale.orderservice.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.flashsale: DEBUG

# RabbitMQ（秒杀订单消费 — 队列定义与 seckill-service 一致）
seckill:
  mq:
    exchange: seckill.order.exchange
    queue: seckill.order.queue
    routing-key: seckill.order.create
    dlq: seckill.order.dlq
    dlx: seckill.order.dlx

spring:
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        # 削峰：一次只预取10条，平滑消费
        prefetch: 10
        # 并发消费者
        concurrency: 3
        max-concurrency: 8
        # 重试机制
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000
          multiplier: 2
        default-requeue-rejected: false
